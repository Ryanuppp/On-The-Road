<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On The Road — Heading for the unknown</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <style>
:root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --text-2: #6e6e73;
    --text-3: #aeaeb2;
    --border: #d2d2d7;
    --accent: #0071e3;
    --accent-bg: rgba(0,113,227,0.06);
    --green: #34c759;
    --green-bg: #e8faf0;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.12);
    --radius: 12px;
    --radius-lg: 20px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC',
             'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ── */
.container { max-width: 860px; margin: 0 auto; padding: 0 20px; }

/* ── Loading / Error ── */
.loading, .error {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 16px; color: var(--text-2);
}
.spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Home Page ── */
.home-hero {
    text-align: center; padding: 80px 20px 32px;
}
.hero-icon { font-size: 4rem; margin-bottom: 8px; }
.home-hero h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.5px; }
.home-hero p { font-size: 1.05rem; color: var(--text-2); margin-top: 6px; }

.plan-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px; max-width: 900px; margin: 24px auto 0; padding: 0 20px;
}
.plan-card {
    display: block; background: var(--card); border-radius: var(--radius-lg);
    padding: 32px; box-shadow: var(--shadow); color: var(--text);
    transition: transform .2s, box-shadow .2s; text-decoration: none !important;
}
.plan-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.plan-emoji { font-size: 2.8rem; margin-bottom: 14px; }
.plan-card h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 6px; }
.plan-meta { font-size: .88rem; color: var(--text-2); }
.plan-desc { font-size: .85rem; color: var(--text-3); margin-top: 4px; }
.card-progress { margin-top: 18px; display: flex; align-items: center; gap: 10px; }
.card-progress .progress-text { font-size: .8rem; color: var(--text-2); white-space: nowrap; }
.plan-new { margin-top: 18px; font-size: .82rem; color: var(--text-3); }

.home-footer {
    text-align: center; padding: 48px 20px 40px;
    font-size: .85rem; color: var(--text-3);
}
.home-footer code {
    background: #e8e8ed; padding: 2px 6px; border-radius: 4px; font-size: .82rem;
}

/* ── Plan Header (sticky) ── */
.plan-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,245,247,.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: .5px solid rgba(0,0,0,.12);
}
.header-inner {
    display: flex; align-items: center; gap: 16px;
    padding-top: 10px; padding-bottom: 10px;
}
.back-btn {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 5px 10px; border-radius: 8px; font-size: .88rem;
    color: var(--accent); white-space: nowrap; transition: background .15s;
}
.back-btn:hover { background: var(--accent-bg); text-decoration: none; }

.overall-progress {
    display: flex; align-items: center; gap: 10px; flex: 1;
    font-size: .82rem; color: var(--text-2); min-width: 0;
}
.progress-label { white-space: nowrap; }
.progress-bar {
    height: 5px; background: #e5e5ea; border-radius: 3px;
    overflow: hidden; flex: 1; min-width: 60px;
}
.progress-fill {
    height: 100%; background: var(--green); border-radius: 3px;
    transition: width .4s ease; min-width: 0;
}
.progress-pct { white-space: nowrap; font-variant-numeric: tabular-nums; }

/* ── Plan Content (rendered Markdown) ── */
.plan-content { padding: 28px 0 80px; animation: fadeUp .35s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

.plan-content > h1:first-child { font-size: 1.85rem; font-weight: 700; margin-bottom: 12px; }
.plan-content h2 {
    font-size: 1.4rem; font-weight: 700; margin-top: 48px; margin-bottom: 18px;
    padding-bottom: 8px; border-bottom: 2px solid var(--accent);
}
.plan-content h3 {
    font-size: 1.15rem; font-weight: 600; margin-top: 36px; margin-bottom: 4px;
    padding: 14px 18px; background: var(--card);
    border-left: 4px solid var(--accent); border-radius: 0 var(--radius) var(--radius) 0;
    box-shadow: var(--shadow-sm);
}
.plan-content h4 {
    font-size: 1rem; font-weight: 600; margin-top: 24px; margin-bottom: 10px;
    color: var(--text-2);
}
.plan-content p { margin-bottom: 12px; }
.plan-content blockquote {
    border-left: 3px solid var(--accent); padding: 10px 16px; margin: 14px 0;
    background: var(--accent-bg); border-radius: 0 8px 8px 0;
    font-size: .92rem; color: var(--text-2);
}
.plan-content blockquote p { margin-bottom: 4px; }
.plan-content blockquote p:last-child { margin-bottom: 0; }
.plan-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
.plan-content ul, .plan-content ol { margin-bottom: 14px; padding-left: 24px; }
.plan-content li { margin-bottom: 5px; }
.plan-content strong { font-weight: 600; }
.plan-content code {
    background: #ececf0; padding: 2px 6px; border-radius: 4px; font-size: .88em;
}
.plan-content img { max-width: 100%; border-radius: 8px; }

/* Day header accent colors (cycle through 5 colors) */
.plan-content h3.day-h3:nth-of-type(5n+1) { border-left-color: #6366f1; }
.plan-content h3.day-h3:nth-of-type(5n+2) { border-left-color: #f59e0b; }
.plan-content h3.day-h3:nth-of-type(5n+3) { border-left-color: #10b981; }
.plan-content h3.day-h3:nth-of-type(5n+4) { border-left-color: #8b5cf6; }
.plan-content h3.day-h3:nth-of-type(5n+5) { border-left-color: #ef4444; }

/* ── Tables ── */
.table-wrapper {
    overflow-x: auto; margin: 14px 0;
    border-radius: var(--radius); box-shadow: var(--shadow-sm);
    -webkit-overflow-scrolling: touch;
}
.plan-content table {
    width: 100%; border-collapse: collapse; font-size: .88rem; background: var(--card);
}
.plan-content th {
    background: #f5f5f7; font-weight: 600; text-align: left;
    padding: 10px 14px; white-space: nowrap; border-bottom: 2px solid var(--border);
}
.plan-content td { padding: 10px 14px; border-bottom: 1px solid #f0f0f3; }
.plan-content tr:last-child td { border-bottom: none; }
.plan-content tbody tr:hover td { background: #fafafa; }

/* ── Day Progress Bar ── */
.day-progress {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 18px 14px; font-size: .82rem; color: var(--text-2);
}
.day-progress .progress-bar { max-width: 200px; }
.day-complete .progress-fill { background: var(--green); }
.day-complete .progress-text::after { content: ' ✅'; }

/* ── Checkable Items ── */
.checkable-list { list-style: none !important; padding-left: 0 !important; }

.checkable-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; margin-bottom: 2px;
    border-radius: 10px; cursor: pointer;
    transition: background .15s, opacity .3s;
}
.checkable-item:hover { background: rgba(0,0,0,.03); }

.check-input {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; min-width: 22px;
    border: 2px solid #c7c7cc; border-radius: 50%;
    margin-top: 2px; cursor: pointer;
    transition: all .2s; position: relative; background: var(--card);
}
.check-input:hover { border-color: var(--green); }
.check-input:checked { background: var(--green); border-color: var(--green); }
.check-input:checked::after {
    content: '✓'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); color: #fff;
    font-size: 13px; font-weight: 700; line-height: 1;
}

.item-content { flex: 1; min-width: 0; }
.item-content ul { margin-top: 6px; }

/* Completed state */
.checkable-item.completed { opacity: .45; }
.checkable-item.completed .item-content {
    text-decoration: line-through;
    text-decoration-color: var(--text-3);
    color: var(--text-3);
}
.checkable-item.completed .item-content strong,
.checkable-item.completed .item-content a,
.checkable-item.completed .item-content em,
.checkable-item.completed .item-content code { color: inherit; }
.checkable-item.completed .item-content a { pointer-events: none; }

/* ── Reset Button ── */
.reset-section {
    text-align: center; padding: 32px 0 48px;
    border-top: 1px solid var(--border); margin-top: 40px;
}
.reset-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 20px; font-size: .85rem; color: var(--text-3);
    cursor: pointer; font-family: var(--font); transition: all .15s;
}
.reset-btn:hover { border-color: #ff3b30; color: #ff3b30; }

/* ── Back-to-top ── */
.back-top {
    position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px;
    border-radius: 50%; background: var(--card); box-shadow: var(--shadow);
    border: 1px solid var(--border); cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: translateY(10px); pointer-events: none;
    transition: opacity .25s, transform .25s;
}
.back-top.visible { opacity: 1; transform: none; pointer-events: auto; }
.back-top:hover { box-shadow: var(--shadow-lg); }

/* ── Responsive ── */
@media (max-width: 640px) {
    .home-hero { padding: 48px 16px 24px; }
    .home-hero h1 { font-size: 1.8rem; }
    .plan-grid { grid-template-columns: 1fr; padding: 0 16px; }
    .plan-content > h1:first-child { font-size: 1.4rem; }
    .plan-content h2 { font-size: 1.2rem; }
    .plan-content h3 { font-size: 1.02rem; padding: 12px 14px; }
    .checkable-item { padding: 10px 10px; gap: 10px; }
    .plan-content table { font-size: .78rem; }
    .plan-content th, .plan-content td { padding: 8px 10px; }
    .header-inner { gap: 10px; }
    .progress-label { display: none; }
}

/* ── Currency Converter ── */
.currency-fab {
    position: fixed; bottom: 28px; right: 84px; width: 44px; height: 44px;
    border-radius: 50%; background: var(--card); box-shadow: var(--shadow);
    border: 1px solid var(--border); cursor: pointer; font-size: 20px;
    display: none; align-items: center; justify-content: center;
    transition: box-shadow .2s, transform .2s; z-index: 200;
}
.currency-fab.visible { display: flex; }
.currency-fab:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

.currency-panel {
    position: fixed; bottom: 84px; right: 28px;
    width: 340px; background: var(--card);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    padding: 22px; z-index: 201;
    display: none;
}
.currency-panel.open { display: block; animation: fadeUp .25s ease; }

.currency-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
}
.currency-info { display: flex; align-items: center; gap: 10px; }
.currency-flag { font-size: 1.5rem; }
.currency-title { font-size: .92rem; font-weight: 600; }
.currency-rate-badge { font-size: .78rem; color: var(--text-2); margin-top: 2px; }
.currency-close {
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--text-3); width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background .15s; flex-shrink: 0;
}
.currency-close:hover { background: rgba(0,0,0,.06); }

.currency-quick {
    display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
}
.currency-quick-btn {
    padding: 5px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); font-size: .82rem; cursor: pointer;
    font-family: var(--font); transition: all .15s; white-space: nowrap;
}
.currency-quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.currency-row {
    display: flex; gap: 10px; align-items: flex-end; margin-bottom: 14px;
}
.currency-input-group { flex: 1; }
.currency-input-group label {
    display: block; font-size: .78rem; color: var(--text-2);
    margin-bottom: 5px; font-weight: 500;
}
.currency-input {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 1rem; font-family: var(--font);
    outline: none; transition: border-color .15s, background .15s;
    background: var(--bg);
}
.currency-input:focus { border-color: var(--accent); background: #fff; }
.currency-input-result {
    background: var(--accent-bg); border-color: transparent;
    color: var(--accent); font-weight: 600;
}
.currency-input-result:focus { border-color: var(--accent); }
.currency-arrow {
    padding-bottom: 12px; color: var(--text-3); font-size: .95rem; flex-shrink: 0;
}
.currency-footer {
    font-size: .72rem; color: var(--text-3); text-align: center;
}

@media (max-width: 640px) {
    .currency-panel { left: 16px; right: 16px; width: auto; bottom: 80px; }
    .currency-fab { right: 76px; }
}

/* ── Restaurant Option Cards ── */
.restaurant-card {
    margin: 20px 0; border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow); background: var(--card);
}
.restaurant-card > h4 {
    margin: 0 !important; padding: 14px 18px !important;
    background: linear-gradient(135deg, #fef7ed, #fdf4e7) !important;
    border-left: 4px solid #f59e0b !important;
    border-radius: 0 !important; box-shadow: none !important;
    font-size: .95rem !important;
}
.restaurant-card > .table-wrapper {
    margin: 0 !important; border-radius: 0 !important; box-shadow: none !important;
}
.restaurant-card th {
    background: #fffbf5 !important; border-bottom-color: #f0e6d6 !important;
    font-size: .82rem !important;
}
.restaurant-card td { border-bottom-color: #f5f0ea !important; }
.restaurant-card tbody tr:hover td { background: #fffdf8 !important; }
.restaurant-card td:last-child { font-size: .78rem; color: var(--text-3); }
.restaurant-card td:last-child a {
    display: inline-block; padding: 3px 10px;
    border: 1px solid #e5ddd3; border-radius: 20px;
    font-size: .76rem; margin: 2px 2px;
    transition: all .15s; text-decoration: none !important;
    color: var(--text-2) !important;
}
.restaurant-card td:last-child a:hover {
    border-color: var(--accent) !important; color: var(--accent) !important;
    background: var(--accent-bg) !important;
}

/* ── Attraction Guide Collapsible ── */
details.attraction-guide {
    margin: 10px 0 4px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--bg); overflow: hidden;
}
details.attraction-guide summary {
    padding: 8px 14px; cursor: pointer; color: var(--accent);
    font-weight: 500; font-size: .85rem; list-style: none;
    display: flex; align-items: center; gap: 6px;
    user-select: none; transition: background .15s;
}
details.attraction-guide summary:hover { background: var(--accent-bg); }
details.attraction-guide summary::-webkit-details-marker { display: none; }
details.attraction-guide summary::before {
    content: '▸'; font-size: .75rem;
    transition: transform .2s; flex-shrink: 0;
}
details.attraction-guide[open] summary::before { transform: rotate(90deg); }
details.attraction-guide[open] summary { border-bottom: 1px solid var(--border); }
details.attraction-guide .guide-content {
    padding: 12px 16px; line-height: 1.7; font-size: .9rem;
}
details.attraction-guide .guide-content > *:first-child { margin-top: 0; }
details.attraction-guide .guide-content > *:last-child { margin-bottom: 0; }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading"><div class="spinner"></div><p>加载中…</p></div>
    </div>
    <button class="back-top" id="backTop" title="回到顶部">↑</button>
    <button class="currency-fab" id="currencyFab" title="货币换算"></button>
    <div class="currency-panel" id="currencyPanel"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
(function () {
    'use strict';

    const KEY = 'tp';

    class TravelApp {
        constructor() {
            this.app = document.getElementById('app');
            this.plans = [];
            this.planId = null;
            this.init();
        }

        async init() {
            try {
                const r = await fetch('plans.json');
                this.plans = await r.json();
            } catch (_) {
                this.plans = [];
            }
            marked.setOptions({ gfm: true, breaks: false });
            window.addEventListener('hashchange', () => this.route());
            this.setupBackTop();
            this.setupCurrencyFab();
            this.route();
        }

        /* ── Routing ── */

        route() {
            const h = decodeURIComponent(location.hash.slice(1));
            if (h.startsWith('/plan/')) {
                this.loadPlan(h.slice(6));
            } else {
                this.showHome();
            }
        }

        /* ── Home ── */

        progress(planId) {
            const t = +localStorage.getItem(`${KEY}-${planId}-total`) || 0;
            const d = +localStorage.getItem(`${KEY}-${planId}-done`) || 0;
            return { total: t, done: d };
        }

        showHome() {
            this.planId = null;
            document.getElementById('currencyFab').classList.remove('visible');
            document.getElementById('currencyPanel').classList.remove('open');
            document.title = 'On The Road — 旅行计划';
            this.app.innerHTML = `
                <div class="home-hero">
                    <div class="hero-icon">✈️</div>
                    <h1>旅行计划</h1>
                    <p>选择一个目的地，开始你的旅程</p>
                </div>
                <div class="plan-grid">
                    ${this.plans.map(p => this.card(p)).join('')}
                </div>
                <div class="home-footer">
                    <p>添加新计划：将 Markdown 文件放入 <code>plans/</code> 目录，并在 <code>plans.json</code> 中注册即可</p>
                </div>`;
        }

        card(p) {
            const { total, done } = this.progress(p.id);
            const pct = total > 0 ? Math.round(done / total * 100) : 0;
            return `<a href="#/plan/${encodeURIComponent(p.id)}" class="plan-card">
                <div class="plan-emoji">${p.emoji || '🗺️'}</div>
                <h2>${esc(p.title)}</h2>
                <div class="plan-meta">${esc(p.dates || '')}</div>
                <div class="plan-desc">${esc(p.description || '')}</div>
                ${total > 0
                    ? `<div class="card-progress">
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                        <span class="progress-text">${done}/${total} 已完成</span>
                       </div>`
                    : '<div class="plan-new">尚未开始</div>'}
            </a>`;
        }

        /* ── Plan ── */

        async loadPlan(id) {
            const plan = this.plans.find(p => p.id === id);
            if (!plan) {
                this.app.innerHTML = `<div class="error"><h2>计划未找到</h2><a href="#/">← 返回首页</a></div>`;
                return;
            }
            this.app.innerHTML = `<div class="loading"><div class="spinner"></div><p>正在加载…</p></div>`;
            try {
                const r = await fetch(plan.file);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                this.renderPlan(plan, await r.text());
            } catch (e) {
                this.app.innerHTML = `<div class="error"><h2>加载失败</h2><p>${esc(e.message)}</p><a href="#/">← 返回首页</a></div>`;
            }
        }

        renderPlan(plan, md) {
            this.planId = plan.id;
            document.title = plan.title + ' — On The Road';
            this.app.innerHTML = `
                <header class="plan-header">
                    <div class="container header-inner">
                        <a href="#/" class="back-btn">← 返回</a>
                        <div class="overall-progress">
                            <span class="progress-label">旅程进度</span>
                            <div class="progress-bar"><div class="progress-fill" id="oFill"></div></div>
                            <span class="progress-pct" id="oText">—</span>
                        </div>
                    </div>
                </header>
                <main class="container">
                    <div class="plan-content" id="pc">${marked.parse(md)}</div>
                </main>`;
            this.postProcess(plan.id);
            this.setupCurrency(md);
        }

        /* ── Post-processing ── */

        postProcess(planId) {
            const c = document.getElementById('pc');

            c.querySelectorAll('table').forEach(t => {
                if (t.parentElement.classList.contains('table-wrapper')) return;
                const w = document.createElement('div');
                w.className = 'table-wrapper';
                t.parentNode.insertBefore(w, t);
                w.appendChild(t);
            });

            this.processRestaurantCards(c);
            this.processAttractionGuides(c);

            c.querySelectorAll('a[href^="http"]').forEach(a => {
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
            });

            this.injectCheckboxes(c, planId);
            this.restoreState();
            this.syncProgress(planId);

            const reset = document.createElement('div');
            reset.className = 'reset-section';
            reset.innerHTML = `<button class="reset-btn" id="resetBtn">重置本计划进度</button>`;
            c.appendChild(reset);
            document.getElementById('resetBtn').addEventListener('click', () => this.resetPlan(planId));
        }

        processRestaurantCards(container) {
            const h4s = [...container.querySelectorAll('h4')];
            h4s.forEach(h4 => {
                if (!h4.textContent.includes('🍽️')) return;
                let next = h4.nextElementSibling;
                let tw = null;
                for (let i = 0; i < 5 && next; i++) {
                    if (next.classList && next.classList.contains('table-wrapper')) { tw = next; break; }
                    next = next.nextElementSibling;
                }
                if (!tw) return;
                const card = document.createElement('div');
                card.className = 'restaurant-card';
                h4.parentNode.insertBefore(card, h4);
                card.appendChild(h4);
                card.appendChild(tw);
            });
        }

        processAttractionGuides(c) {
            const h2s = [...c.querySelectorAll('h2')];
            const guideH2 = h2s.find(h => h.textContent.includes('景点') && h.textContent.includes('介绍'));
            if (!guideH2) return;

            const nextH2 = h2s[h2s.indexOf(guideH2) + 1] || null;
            const sectionEls = [guideH2];
            let nd = guideH2.nextElementSibling;
            while (nd && nd !== nextH2 && nd.tagName !== 'H2') {
                sectionEls.push(nd);
                nd = nd.nextElementSibling;
            }

            const hasH3 = sectionEls.some(el => el.tagName === 'H3');
            const attractions = [];

            if (hasH3) {
                let cur = null, els = [];
                for (const el of sectionEls) {
                    if (el === guideH2) continue;
                    if (el.tagName === 'H3') {
                        if (cur) attractions.push({ name: cur, els });
                        cur = el.textContent.replace(/^\d+[\.\s]+/, '').trim();
                        els = [];
                    } else if (el.tagName !== 'HR' && cur) {
                        els.push(el);
                    }
                }
                if (cur) attractions.push({ name: cur, els });
            } else {
                for (const el of sectionEls) {
                    const tbl = el.tagName === 'TABLE' ? el : el.querySelector?.('table');
                    if (!tbl) continue;
                    const rows = tbl.querySelectorAll('tbody tr');
                    (rows.length ? rows : tbl.querySelectorAll('tr:not(:first-child)')).forEach(row => {
                        const cells = row.querySelectorAll('td');
                        if (cells.length >= 3) attractions.push({
                            name: cells[1].textContent.trim(),
                            html: '<p>' + cells[2].innerHTML + '</p>' +
                                (cells.length >= 4 ? '<p><b>亲子适宜度</b>：' + cells[3].innerHTML + '</p>' : '')
                        });
                    });
                }
            }

            if (!attractions.length) return;

            const allLis = [...c.querySelectorAll('ol > li')];
            const movedEls = new Set(), usedLis = new Set();

            for (const attr of attractions) {
                const terms = this.guideSearchTerms(attr.name);
                let target = null;
                for (const term of terms) {
                    if (term.length < 2) continue;
                    for (const li of allLis) {
                        if (usedLis.has(li)) continue;
                        if (li.textContent.includes(term)) { target = li; break; }
                    }
                    if (target) break;
                }
                if (!target) continue;
                usedLis.add(target);

                const det = document.createElement('details');
                det.className = 'attraction-guide';
                const sum = document.createElement('summary');
                sum.textContent = '📖 ' + attr.name;
                det.appendChild(sum);

                const div = document.createElement('div');
                div.className = 'guide-content';
                if (attr.els) attr.els.forEach(e => { div.appendChild(e); movedEls.add(e); });
                else if (attr.html) div.innerHTML = attr.html;
                det.appendChild(div);
                target.appendChild(det);
            }

            const prev = guideH2.previousElementSibling;
            if (prev && prev.tagName === 'HR') prev.style.display = 'none';
            sectionEls.forEach(el => { if (!movedEls.has(el)) el.style.display = 'none'; });
        }

        guideSearchTerms(name) {
            const s = name.replace(/[\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}]/gu, '').replace(/^\d+[\.\s]+/, '').trim();
            const a = s.replace(/\s*[（(].*[）)]\s*/g, '').trim();
            const b = a.replace(/\s*(与|和|以及|\/|／).*$/, '').trim();
            const d = b.replace(/^(海参崴|苏州|上海|北京|杭州)/, '').trim();
            const terms = [];
            const add = t => { if (t && t.length >= 2 && !terms.includes(t)) terms.push(t); };
            add(a); add(b); add(d);
            if (/^[\u4e00-\u9fff]/.test(b)) add(b.replace(/\s+[A-Za-z].*$/, '').trim());
            if (/^[A-Za-z]/.test(b)) add(b.replace(/\s+[\u4e00-\u9fff].*$/, '').trim());
            return terms;
        }

        injectCheckboxes(container, planId) {
            const h3s = container.querySelectorAll('h3');
            let dayNum = 0;

            h3s.forEach(h3 => {
                if (!/Day\s*\d/i.test(h3.textContent)) return;
                dayNum++;
                h3.classList.add('day-h3');

                const prog = document.createElement('div');
                prog.className = 'day-progress';
                prog.dataset.day = dayNum;
                prog.innerHTML = `<div class="progress-bar"><div class="progress-fill"></div></div><span class="progress-text"></span>`;
                h3.after(prog);

                let el = prog.nextElementSibling;
                while (el && el.tagName !== 'H3' && el.tagName !== 'H2') {
                    if (el.tagName === 'OL') {
                        el.classList.add('checkable-list');
                        el.querySelectorAll(':scope > li').forEach((li, i) => {
                            this.makeCheckable(li, `${planId}-d${dayNum}-${i}`, dayNum);
                        });
                    }
                    el = el.nextElementSibling;
                }
            });
        }

        makeCheckable(li, itemId, dayNum) {
            li.classList.add('checkable-item');
            li.dataset.itemId = itemId;
            li.dataset.day = dayNum;

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'check-input';

            const wrap = document.createElement('div');
            wrap.className = 'item-content';
            while (li.firstChild) wrap.appendChild(li.firstChild);

            li.appendChild(cb);
            li.appendChild(wrap);

            li.addEventListener('click', e => {
                if (e.target.tagName === 'A' || e.target.closest('a') || e.target === cb || e.target.closest('details')) return;
                cb.checked = !cb.checked;
                cb.dispatchEvent(new Event('change'));
            });

            cb.addEventListener('change', () => {
                li.classList.toggle('completed', cb.checked);
                if (cb.checked) localStorage.setItem(`${KEY}-${itemId}`, '1');
                else localStorage.removeItem(`${KEY}-${itemId}`);
                this.syncProgress(this.planId);
            });
        }

        restoreState() {
            document.querySelectorAll('.checkable-item').forEach(li => {
                if (localStorage.getItem(`${KEY}-${li.dataset.itemId}`) === '1') {
                    li.classList.add('completed');
                    li.querySelector('.check-input').checked = true;
                }
            });
        }

        syncProgress(planId) {
            const all = document.querySelectorAll('.checkable-item');
            const done = document.querySelectorAll('.checkable-item.completed');
            const t = all.length, d = done.length;

            localStorage.setItem(`${KEY}-${planId}-total`, t);
            localStorage.setItem(`${KEY}-${planId}-done`, d);

            const fill = document.getElementById('oFill');
            const text = document.getElementById('oText');
            if (fill) fill.style.width = t > 0 ? `${Math.round(d / t * 100)}%` : '0%';
            if (text) text.textContent = t > 0 ? `${d}/${t}` : '—';

            document.querySelectorAll('.day-progress').forEach(dp => {
                const day = dp.dataset.day;
                const dt = document.querySelectorAll(`.checkable-item[data-day="${day}"]`).length;
                const dd = document.querySelectorAll(`.checkable-item[data-day="${day}"].completed`).length;
                const f = dp.querySelector('.progress-fill');
                const tx = dp.querySelector('.progress-text');
                if (f) f.style.width = dt > 0 ? `${Math.round(dd / dt * 100)}%` : '0%';
                if (tx) tx.textContent = dt > 0 ? `${dd}/${dt} 已完成` : '';
                dp.classList.toggle('day-complete', dd === dt && dt > 0);
            });
        }

        resetPlan(planId) {
            if (!confirm('确定要重置「' + planId + '」的所有进度吗？此操作不可撤销。')) return;
            const toRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k && k.startsWith(`${KEY}-${planId}`)) toRemove.push(k);
            }
            toRemove.forEach(k => localStorage.removeItem(k));
            document.querySelectorAll('.checkable-item').forEach(li => {
                li.classList.remove('completed');
                li.querySelector('.check-input').checked = false;
            });
            this.syncProgress(planId);
        }

        /* ── Currency Converter ── */

        setupCurrencyFab() {
            const fab = document.getElementById('currencyFab');
            const panel = document.getElementById('currencyPanel');
            fab.addEventListener('click', (e) => {
                e.stopPropagation();
                panel.classList.toggle('open');
            });
            document.addEventListener('click', (e) => {
                if (!panel.contains(e.target) && e.target !== fab) {
                    panel.classList.remove('open');
                }
            });
        }

        detectCurrency(md) {
            const currencies = [
                { symbol: '₽', code: 'RUB', name: '俄罗斯卢布', flag: '🇷🇺' },
                { symbol: '€', code: 'EUR', name: '欧元', flag: '🇪🇺' },
                { symbol: '£', code: 'GBP', name: '英镑', flag: '🇬🇧' },
                { symbol: '₩', code: 'KRW', name: '韩元', flag: '🇰🇷' },
                { symbol: '฿', code: 'THB', name: '泰铢', flag: '🇹🇭' },
                { symbol: '₫', code: 'VND', name: '越南盾', flag: '🇻🇳' },
                { symbol: '₸', code: 'KZT', name: '哈萨克坚戈', flag: '🇰🇿' },
                { symbol: '$', code: 'USD', name: '美元', flag: '🇺🇸' },
            ];
            let best = null, bestCount = 0;
            for (const c of currencies) {
                const escaped = c.symbol.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const count = (md.match(new RegExp(escaped, 'g')) || []).length;
                if (count > bestCount) { best = c; bestCount = count; }
            }
            return best;
        }

        async fetchRate(code) {
            const cacheKey = `tp-rate-${code}`;
            const cached = sessionStorage.getItem(cacheKey);
            if (cached) {
                const { rate, ts } = JSON.parse(cached);
                if (Date.now() - ts < 30 * 60 * 1000) return rate;
            }
            try {
                const r = await fetch(`https://open.er-api.com/v6/latest/${code}`);
                const data = await r.json();
                if (data.result === 'success' && data.rates?.CNY) {
                    const rate = data.rates.CNY;
                    sessionStorage.setItem(cacheKey, JSON.stringify({ rate, ts: Date.now() }));
                    return rate;
                }
            } catch (_) {}
            const fallback = { RUB: 0.076, USD: 7.25, EUR: 7.90, GBP: 9.20, KRW: 0.0053, THB: 0.21, VND: 0.00029, KZT: 0.015 };
            return fallback[code] || 1;
        }

        async setupCurrency(md) {
            const currency = this.detectCurrency(md);
            const fab = document.getElementById('currencyFab');
            const panel = document.getElementById('currencyPanel');
            if (!currency) {
                fab.classList.remove('visible');
                panel.classList.remove('open');
                return;
            }
            this.currencyInfo = currency;
            fab.textContent = currency.flag;
            fab.title = `${currency.name} → 人民币`;
            fab.classList.add('visible');
            panel.innerHTML = `<div style="text-align:center;padding:30px 0;color:var(--text-3);font-size:.88rem">汇率加载中…</div>`;

            const currentPlanId = this.planId;
            const rate = await this.fetchRate(currency.code);
            if (this.planId !== currentPlanId) return;
            this.currencyRate = rate;
            this.renderCurrencyPanel();
        }

        renderCurrencyPanel() {
            const panel = document.getElementById('currencyPanel');
            const { symbol, code, name, flag } = this.currencyInfo;
            const rate = this.currencyRate;
            const qMap = {
                RUB: [100, 500, 1000, 5000, 10000], USD: [10, 50, 100, 500],
                EUR: [10, 50, 100, 500], GBP: [10, 50, 100, 500],
                KRW: [1000, 5000, 10000, 50000], THB: [100, 500, 1000, 5000],
                VND: [10000, 50000, 100000, 500000], KZT: [500, 1000, 5000, 10000],
            };
            const amounts = qMap[code] || [100, 500, 1000, 5000];
            panel.innerHTML = `
                <div class="currency-header">
                    <div class="currency-info">
                        <span class="currency-flag">${flag}</span>
                        <div>
                            <div class="currency-title">${esc(name)} → 人民币</div>
                            <div class="currency-rate-badge">1 ${esc(code)} ≈ ${rate.toFixed(4)} CNY</div>
                        </div>
                    </div>
                    <button class="currency-close" onclick="document.getElementById('currencyPanel').classList.remove('open')">×</button>
                </div>
                <div class="currency-quick">
                    ${amounts.map(a => `<button class="currency-quick-btn" data-amount="${a}">${a.toLocaleString()}</button>`).join('')}
                </div>
                <div class="currency-row">
                    <div class="currency-input-group">
                        <label>${esc(symbol)} ${esc(code)}</label>
                        <input type="number" class="currency-input" id="currFrom" placeholder="输入金额" inputmode="decimal">
                    </div>
                    <div class="currency-arrow">→</div>
                    <div class="currency-input-group">
                        <label>¥ CNY</label>
                        <input type="number" class="currency-input currency-input-result" id="currTo" placeholder="0.00" inputmode="decimal">
                    </div>
                </div>
                <div class="currency-footer">汇率来源 open.er-api.com · 仅供参考</div>`;

            const from = document.getElementById('currFrom');
            const to = document.getElementById('currTo');
            from.addEventListener('input', () => {
                const v = parseFloat(from.value);
                to.value = isNaN(v) || from.value === '' ? '' : (v * rate).toFixed(2);
            });
            to.addEventListener('input', () => {
                const v = parseFloat(to.value);
                from.value = isNaN(v) || to.value === '' ? '' : (v / rate).toFixed(2);
            });
            panel.querySelectorAll('.currency-quick-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    from.value = btn.dataset.amount;
                    from.dispatchEvent(new Event('input'));
                });
            });
        }

        /* ── Back to Top ── */

        setupBackTop() {
            const btn = document.getElementById('backTop');
            let ticking = false;
            window.addEventListener('scroll', () => {
                if (!ticking) {
                    requestAnimationFrame(() => {
                        btn.classList.toggle('visible', window.scrollY > 400);
                        ticking = false;
                    });
                    ticking = true;
                }
            });
            btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => new TravelApp());
    } else {
        new TravelApp();
    }
})();
    </script>
</body>
